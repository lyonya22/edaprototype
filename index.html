<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FoodExpress - Доставка еды</title>

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#0f0f0f;
    color:white;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 40px;
    background:#151515;
}

.logo{
    font-size:24px;
    font-weight:bold;
    color:#ff6b00;
}

nav a{
    margin-left:20px;
    text-decoration:none;
    color:white;
    opacity:0.8;
}

nav a:hover{
    opacity:1;
}

.hero{
    text-align:center;
    padding:80px 20px;
    background:linear-gradient(120deg,#ff6b00,#ff2d55);
}

.hero h1{
    font-size:42px;
    margin-bottom:10px;
}

.hero p{
    opacity:0.9;
}

.cart{
background:#1c1c1c;
padding:8px 15px;
border-radius:20px;
font-size:14px;
}

    
.menu{
    padding:60px 40px;
}

.menu h2{
    text-align:center;
    margin-bottom:40px;
}

.food-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:25px;
}

.card{
    background:#1c1c1c;
    border-radius:15px;
    overflow:hidden;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
}

.card img{
    width:100%;
    height:160px;
    object-fit:cover;
}

.card-body{
    padding:15px;
}

.food-title{
    font-size:18px;
    margin-bottom:10px;
}

.price{
    color:#ff6b00;
    font-weight:bold;
}

button{
    margin-top:10px;
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#ff6b00;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#ff8c2f;
}

footer{
    text-align:center;
    padding:20px;
    background:#151515;
    margin-top:40px;
}

</style>
</head>

<body>

<header>

<div class="logo">FoodExpress</div>

<nav>
<a href="#">Меню</a>
<a href="#">Доставка</a>
<a href="#">Контакты</a>
</nav>

<div class="cart">
🛒 <span id="cart-count">0</span> | <span id="cart-total">0 ₸</span>
</div>
    
</header>


<section class="hero">

<h1>Быстрая доставка еды</h1>
<p>Горячая еда прямо к вашей двери</p>

</section>


<section class="menu">

<h2>Популярные блюда</h2>

    
<div class="food-grid">

<div class="card">

<img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">

<div class="card-body">

<div class="food-title">Бургер</div>
<div class="price">1500₸</div>

<button onclick="order('Бургер')">Заказать</button>

</div>
</div>


<div class="card">

<img src="https://images.unsplash.com/photo-1594007654729-407eedc4be65">

<div class="card-body">

<div class="food-title">Пицца</div>
<div class="price">2500₸</div>

<button onclick="order('Пицца')">Заказать</button>

</div>
</div>


<div class="card">

<img src="https://images.unsplash.com/photo-1555939594-58d7cb561ad1">

<div class="card-body">

<div class="food-title">Паста</div>
<div class="price">2000₸</div>

<button onclick="order('Паста')">Заказать</button>

</div>
</div>


<div class="card">

<img src="https://images.unsplash.com/photo-1617196035154-1e7e6e28b0db?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTV8fHN1c2hpfGVufDB8fDB8fHww">

<div class="card-body">

<div class="food-title">Суши</div>
<div class="price">3000₸</div>

<button onclick="order('Суши')">Заказать</button>

</div>
</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1659046842567-2787b5c9c2fe?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8bW9oaXRvfGVufDB8fDB8fHww">

<div class="card-body">

<div class="food-title">Мохито</div>
<div class="price">800₸</div>

<button onclick="order('Мохито')">Заказать</button>

</div>
</div>



    
</div>

</section>


<footer>

© 2026 FoodExpress

</footer>


<script>

function order(food){
    alert("Вы заказали: " + food);
}

</script>



<script>

let cart = [];

function order(food, price){
    cart.push({name: food, price: price});
    updateCart();
}

function updateCart(){
    let total = 0;

    cart.forEach(item => {
        total += item.price;
    });

    document.getElementById("cart-count").innerText = cart.length;
    document.getElementById("cart-total").innerText = total + " ₸";
}

</script>


    
</body>
</html>
